<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>🔒 Área restrita</h2>
    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="entrar()">Entrar</button>
    <p id="erro"></p>
  </div>
</div>

<!-- CONTEÚDO -->
<div id="conteudo">

  <div class="cake">
    <div class="top"></div>
    <div class="middle"></div>
    <div class="bottom"></div>
    <div class="vela"></div>
  </div>

  <h1>Happy Birthday</h1>
  <p>Desejar um feliz aniversário cheio de alegria e felicidade!</p>

  <button onclick="explodir()">Aperte</button>

</div>

<div class="confetti-container"></div>

<audio id="musica" loop>
  <source src="audio/musica.mp3" type="audio/mpeg">
</audio>

<script>
function entrar() {
  const senha = "1234";
  const input = document.getElementById("senha").value;

  if (input === senha) {
    const login = document.getElementById("login");
    const conteudo = document.getElementById("conteudo");

    login.style.opacity = "0";

    setTimeout(() => {
      login.style.display = "none";
      conteudo.style.display = "flex";

      setTimeout(() => {
        conteudo.style.opacity = "1";
      }, 50);

      document.getElementById("musica").play();
    }, 500);

  } else {
    document.getElementById("erro").innerText = "Senha errada 😈";
  }
}
</script>

<script src="script.js"></script>

</body>
</html>
