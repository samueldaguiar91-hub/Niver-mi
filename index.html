<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login">
  <div class="box">
    <h2>🔒 Área restrita</h2>
    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="entrar()">Entrar</button>
    <p id="erro"></p>
  </div>
</div>

<style>
  #login {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #1e1e1e;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .box {
    background: #2c2c2c;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 80%;
    max-width: 300px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
  }

  button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #ff4d4d;
    color: white;
    font-weight: bold;
  }

  #erro {
    color: red;
    margin-top: 10px;
  }
</style>

<script>
  function entrar() {
    const senha = "1234";
    const input = document.getElementById("senha").value;

    if (input === senha) {
      document.getElementById("login").style.display = "none";
    } else {
      document.getElementById("erro").innerText = "Senha errada 😈";
    }
  }
</script>

  <div class="conteudo">

    <div class="cake">
      <div class="top"></div>
      <div class="middle"></div>
      <div class="bottom"></div>
      <div class="vela"></div>
    </div>

    <h1>Happy Birthday</h1>
    <p>Desejar um feliz aniversário cheio de alegria e felicidade!</p>

    <button onclick="explodir()">Aperte</button>

  </div>

  <div class="confetti-container"></div>

  <audio id="musica" loop>
    <source src="áudio/musica.mp4" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
  
</body>
</html>
